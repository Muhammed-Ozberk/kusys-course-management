name: kusys-course-management

services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kusys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kusys"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      NODE_ENV: development
      PORT: 8080
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: kusys
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: local-docker-secret-change-me
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    environment:
      HOST: 0.0.0.0
      VITE_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
